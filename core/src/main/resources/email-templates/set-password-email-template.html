<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Account Created</title>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type"/>
</head>
<body style="font-family: Arial, sans-serif; color: #333333; background-color: #f5f5f5; margin: 0; padding: 0;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f5f5f5; padding: 30px 0;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.08);">
                <tr>
                    <td style="background-color: #1d4ed8; padding: 24px 32px;">
                        <p style="margin: 0; color: #ffffff; font-size: 18px; font-weight: bold;">Account Created</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 32px;">
                        <p style="margin: 0 0 16px 0; font-size: 15px;">Hello,</p>
                        <p style="margin: 0 0 24px 0; font-size: 15px;">An account has been created for you. Please click the button below to set your password and activate your account. This link is valid for the next 24 hours.</p>
                        <table cellpadding="0" cellspacing="0" style="margin-bottom: 24px;">
                            <tr>
                                <td style="border-radius: 4px; background-color: #3b82f6;">
                                    <a th:href="${passwordSetupLink}" style="display: inline-block; padding: 12px 24px; color: #ffffff; text-decoration: none; font-size: 15px; font-weight: bold; border-radius: 4px;">Set your password</a>
                                </td>
                            </tr>
                        </table>
                        <p style="margin: 0; font-size: 15px;">Best Regards</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
