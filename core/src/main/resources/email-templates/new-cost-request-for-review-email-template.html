<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${title}"></title>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type"/>
</head>
<body style="font-family: Arial, sans-serif; color: #333333; background-color: #f5f5f5; margin: 0; padding: 0;">
<table cellpadding="0" cellspacing="0" style="background-color: #f5f5f5; padding: 30px 0;" width="100%">
    <tr>
        <td align="center">
            <table cellpadding="0" cellspacing="0"
                   style="background-color: #ffffff; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.08);"
                   width="600">
                <!-- Header -->
                <tr>
                    <td style="background-color: #1d4ed8; padding: 24px 32px;">
                        <p style="margin: 0; color: #ffffff; font-size: 18px; font-weight: bold;">Request for Quotation
                            — Review
                            Required</p>
                    </td>
                </tr>
                <!-- Body -->
                <tr>
                    <td style="padding: 32px;">
                        <p style="margin: 0 0 20px 0; font-size: 15px;">Hello,</p>
                        <p style="margin: 0 0 24px 0; font-size: 15px;">A request for quotation is available for your
                            review. Please find the details below:</p>

                        <!-- Info box -->
                        <table cellpadding="0" cellspacing="0"
                               style="background-color: #f0f6ff; border-left: 4px solid #3b82f6; border-radius: 4px; margin-bottom: 24px;"
                               width="100%">
                            <tr>
                                <td style="padding: 20px 24px;">
                                    <table cellpadding="0" cellspacing="0" width="100%">
                                        <tr>
                                            <td style="padding: 6px 0;">
                                                <span style="font-size: 12px; color: #666666; text-transform: uppercase; letter-spacing: 0.5px;">Reference Number</span><br/>
                                                <span style="font-size: 20px; font-weight: bold; color: #3b82f6;"
                                                      th:text="${crReferenceNumber}"></span>
                                            </td>
                                            <td style="padding: 6px 0; text-align: right;">
                                                <span style="font-size: 12px; color: #666666; text-transform: uppercase; letter-spacing: 0.5px;">Revision</span><br/>
                                                <span style="font-size: 20px; font-weight: bold; color: #3b82f6;"
                                                      th:text="${crRevision}"></span>
                                            </td>
                                        </tr>
                                    </table>
                                </td>
                            </tr>
                        </table>

                        <p style="margin: 0 0 32px 0; font-size: 15px;">Please log in to the platform to proceed with
                            the review.</p>
                        <p style="margin: 0; font-size: 15px;">Best Regards</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
