<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${title}"></title>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type"/>
</head>
<body style="font-family: Arial, sans-serif; color: #333333; background-color: #f5f5f5; margin: 0; padding: 0;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f5f5f5; padding: 30px 0;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.08);">
                <tr>
                    <td style="background-color: #1d4ed8; padding: 24px 32px;">
                        <p style="margin: 0; color: #ffffff; font-size: 18px; font-weight: bold;">Line Price Rejected</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 32px;">
                        <p style="margin: 0 0 20px 0; font-size: 15px;">Hello,</p>
                        <p style="margin: 0 0 24px 0; font-size: 15px;">The price for the following line has been rejected by management.</p>
                        <p style="margin: 0 0 6px 0; font-size: 12px; color: #666666; text-transform: uppercase; letter-spacing: 0.5px; font-weight: bold;">Request for Quotation</p>
                        <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f8f8f8; border-left: 4px solid #aaaaaa; border-radius: 4px; margin-bottom: 16px;">
                            <tr>
                                <td style="padding: 16px 24px;">
                                    <table width="100%" cellpadding="0" cellspacing="0">
                                        <tr>
                                            <td style="padding: 4px 0;">
                                                <span style="font-size: 12px; color: #666666; text-transform: uppercase; letter-spacing: 0.5px;">Reference Number</span><br/>
                                                <span th:text="${crReferenceNumber}" style="font-size: 16px; font-weight: bold; color: #555555;"></span>
                                            </td>
                                            <td style="padding: 4px 0; text-align: right;">
                                                <span style="font-size: 12px; color: #666666; text-transform: uppercase; letter-spacing: 0.5px;">Revision</span><br/>
                                                <span th:text="${crRevision}" style="font-size: 16px; font-weight: bold; color: #555555;"></span>
                                            </td>
                                        </tr>
                                    </table>
                                </td>
                            </tr>
                        </table>
                        <p style="margin: 0 0 6px 0; font-size: 12px; color: #666666; text-transform: uppercase; letter-spacing: 0.5px; font-weight: bold;">Line</p>
                        <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f0f6ff; border-left: 4px solid #3b82f6; border-radius: 4px; margin-bottom: 16px;">
                            <tr>
                                <td style="padding: 20px 24px;">
                                    <table width="100%" cellpadding="0" cellspacing="0">
                                        <tr>
                                            <td style="padding: 6px 0;">
                                                <span style="font-size: 12px; color: #666666; text-transform: uppercase; letter-spacing: 0.5px;">Part Number</span><br/>
                                                <span th:text="${crLinePartNumber}" style="font-size: 20px; font-weight: bold; color: #3b82f6;"></span>
                                            </td>
                                            <td style="padding: 6px 0; text-align: right;">
                                                <span style="font-size: 12px; color: #666666; text-transform: uppercase; letter-spacing: 0.5px;">Revision</span><br/>
                                                <span th:text="${crLineRevision}" style="font-size: 20px; font-weight: bold; color: #3b82f6;"></span>
                                            </td>
                                        </tr>
                                    </table>
                                </td>
                            </tr>
                        </table>
                        <div th:if="${reason != null and !#strings.isEmpty(reason)}">
                            <p style="margin: 0 0 6px 0; font-size: 12px; color: #666666; text-transform: uppercase; letter-spacing: 0.5px; font-weight: bold;">Rejection Reason</p>
                            <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #fff5f5; border-left: 4px solid #e53e3e; border-radius: 4px; margin-bottom: 16px;">
                                <tr>
                                    <td style="padding: 16px 24px;">
                                        <span th:text="${reason}" style="font-size: 15px; color: #c53030;"></span>
                                    </td>
                                </tr>
                            </table>
                        </div>
                        <p style="margin: 0 0 32px 0; font-size: 15px;">Please log in to the platform to proceed.</p>
                        <p style="margin: 0; font-size: 15px;">Best Regards</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
